name: Destroy DEV Environment

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy-dev:
    runs-on: ubuntu-latest
    environment: DEV
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: env/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (DEV)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      # Azure Login action 支持传入 client-id / tenant-id / subscription-id [3](https://github.com/marketplace/actions/azure-login)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      # setup-terraform 用于安装 Terraform CLI，后续步骤直接运行 terraform 命令 [4](https://github.com/hashicorp/setup-terraform)

      - name: Terraform Init (DEV)
        run: terraform init

      # Checks that all Terraform configuration files adhere to a canonical format
      # - name: Terraform Format
      #   run: terraform fmt # -check

      # - name: Terraform Validate (DEV)
      #   run: terraform validate

      # - name: Terraform Plan (DEV)
      #   run: terraform plan -no-color

      # - name: Terraform Apply (DEV)
      #   run: terraform apply -auto-approve
      
      - name: Terraform Destroy
        run: terraform destroy -auto-approve
